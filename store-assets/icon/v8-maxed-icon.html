<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V8 — Maxed Icon</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1024px; height:1024px; overflow:hidden; background:#0A0A0F; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; }
  .icon {
    width:1024px; height:1024px; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse at 40% 30%, rgba(74,144,217,0.22) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 50%, rgba(52,199,89,0.16) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 65%, rgba(155,89,182,0.06) 0%, transparent 40%),
      #0A0A0F;
  }
  /* Soft blobs for depth */
  .blob {
    position:absolute; border-radius:50%; z-index:2;
    filter: blur(100px);
  }
  .blob.blue {
    width:500px; height:500px;
    top:120px; left:140px;
    background: rgba(74,144,217,0.18);
  }
  .blob.green {
    width:450px; height:450px;
    top:250px; right:140px;
    background: rgba(52,199,89,0.14);
  }
  /* Chain link — BIG, fills the space */
  .loop-svg {
    width:660px; height:660px; z-index:10; position:relative;
    margin-top:-20px;
    filter: drop-shadow(0 0 60px rgba(74,144,217,0.45)) drop-shadow(0 0 120px rgba(52,199,89,0.18));
  }
  /* Glass circle behind link */
  .glass-card {
    position:absolute; z-index:8;
    width:720px; height:720px; border-radius:50%;
    top:80px;
    background: rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.06);
    box-shadow: inset 0 0 80px rgba(74,144,217,0.04);
  }
  /* Wordmark — BIG and bold */
  .wordmark {
    position:relative; z-index:12;
    margin-top:-24px;
    font-size:128px; font-weight:900; letter-spacing:-4px;
    background: linear-gradient(135deg, #7BB3FF 0%, #4A90D9 40%, #34C759 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    line-height:1;
  }
  .sub {
    position:relative; z-index:12;
    margin-top:8px;
    font-size:22px; font-weight:700; color:rgba(255,255,255,0.22);
    letter-spacing:14px; text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="icon">
  <div class="blob blue"></div>
  <div class="blob green"></div>
  <div class="glass-card"></div>

  <svg class="loop-svg" viewBox="0 0 280 280" fill="none">
    <defs>
      <linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7BB3FF"/>
        <stop offset="50%" stop-color="#4A90D9"/>
        <stop offset="100%" stop-color="#3A7BC8"/>
      </linearGradient>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5FE89D"/>
        <stop offset="50%" stop-color="#34C759"/>
        <stop offset="100%" stop-color="#2A9E47"/>
      </linearGradient>
      <filter id="gl">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>
    <!-- Left loop (blue) -->
    <g filter="url(#gl)">
      <rect x="44" y="82" width="120" height="116" rx="58" ry="58" stroke="url(#b)" stroke-width="18" fill="none"/>
    </g>
    <!-- Right loop (green) -->
    <g filter="url(#gl)">
      <rect x="116" y="82" width="120" height="116" rx="58" ry="58" stroke="url(#g)" stroke-width="18" fill="none"/>
    </g>
    <!-- Overlap masks to create interlocking effect -->
    <rect x="126" y="72" width="24" height="28" fill="#0A0A0F" opacity="0.95" rx="2"/>
    <rect x="126" y="180" width="24" height="28" fill="#0A0A0F" opacity="0.95" rx="2"/>
    <!-- Overlap crossings -->
    <line x1="126" y1="194" x2="150" y2="194" stroke="url(#g)" stroke-width="18" stroke-linecap="round"/>
    <line x1="126" y1="86" x2="150" y2="86" stroke="url(#b)" stroke-width="18" stroke-linecap="round"/>
  </svg>

  <div class="wordmark">LinkLoop</div>
  <div class="sub">T1D Wellness</div>
</div>
</body>
</html>
